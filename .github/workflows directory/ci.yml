name: Nextjs Workshop Demo

on:
  push:
    branches:
      - 'feature-**'

jobs:
  lint-job: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: action/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm' 
      - run: node -v
      - run: npm ci
      - run: npm run lint